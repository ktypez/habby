<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HABBY — Habits & Streaks</title>
    <meta name="description" content="Track your habits, build streaks, level up." />
    <meta name="theme-color" content="#ffffff" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
      <div class="login-card">
        <div class="login-emoji">🔐</div>
        <div class="login-title">HABBY</div>
        <div class="login-sub">Enter access password</div>
        <div class="login-form">
          <input type="password" id="loginInput" class="login-input" placeholder="password" autocomplete="off" />
          <button id="loginBtn" class="login-btn">UNLOCK</button>
        </div>
        <div class="login-error hidden" id="loginError">Invalid password</div>
      </div>
    </div>

    <div id="app" class="hidden">
      <!-- HEADER -->
      <header class="header">
        <div class="header-inner">
          <div class="header-brand">
            <span class="header-logo">🎯</span>
            <span class="header-title">HABBY</span>
          </div>
          <div class="header-actions">
            <button class="btn-header-icon" id="themeBtn" title="Theme picker">🎨</button>
            <button class="btn-header-icon" id="digestBtn" title="Daily Digest">📋</button>
            <button class="btn-header-icon" id="statsBtn" title="Statistics">📊</button>
            <button class="btn-header-icon" id="notifBtn" title="Notification settings">🔔</button>
            <span class="stat-badge" id="totalStreaks">🔥 0</span>
          </div>
        </div>
        <!-- XP Bar -->
        <div class="xp-header" id="xpHeader">
          <div class="xp-header-inner">
            <span class="xp-level-badge" id="xpLevelBadge">LVL 1</span>
            <div class="xp-bar-track">
              <div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div>
            </div>
            <span class="xp-numbers" id="xpNumbers">0 / 100 XP</span>
          </div>
        </div>
      </header>

      <main class="main">
        <!-- ADD HABIT FORM -->
        <section class="add-habit-section">
          <div class="add-habit-card">
            <h2 class="add-habit-title">NEW HABIT</h2>
            <div class="add-habit-form">
              <div class="emoji-picker" id="emojiPicker">
                <button class="emoji-option selected" data-emoji="🏃">🏃</button>
                <button class="emoji-option" data-emoji="📚">📚</button>
                <button class="emoji-option" data-emoji="💧">💧</button>
                <button class="emoji-option" data-emoji="🧘">🧘</button>
                <button class="emoji-option" data-emoji="✍️">✍️</button>
                <button class="emoji-option" data-emoji="💪">💪</button>
                <button class="emoji-option" data-emoji="🥗">🥗</button>
                <button class="emoji-option" data-emoji="🧠">🧠</button>
                <button class="emoji-option" data-emoji="🎨">🎨</button>
                <button class="emoji-option" data-emoji="🧹">🧹</button>
                <button class="emoji-option" data-emoji="🌅">🌅</button>
                <button class="emoji-option" data-emoji="🌙">🌙</button>
                <button class="emoji-option" data-emoji="☕">☕</button>
                <button class="emoji-option" data-emoji="🚶">🚶</button>
                <button class="emoji-option" data-emoji="🎵">🎵</button>
                <button class="emoji-option" data-emoji="🗣️">🗣️</button>
              </div>

              <div class="add-habit-input-row">
                <input type="text" id="habitInput" class="habit-input" placeholder="e.g. Run 5 kilometers..." maxlength="60" autocomplete="off" />
                <button id="addHabitBtn" class="btn-add">+ ADD</button>
              </div>
            </div>
          </div>
        </section>

        <!-- TODAY'S HABITS -->
        <section class="habits-section">
          <div class="section-head">
            <h2 class="section-title">TODAY</h2>
            <span class="section-sub" id="habitsCount">0 habits</span>
          </div>
          <div class="habits-list" id="habitsList">
            <!-- Populated by JS -->
          </div>
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">✨</div>
            <h3 class="empty-title">No habits yet</h3>
            <p class="empty-text" id="emptyText">Add your first habit above and start your streak!</p>
          </div>
        </section>

        <!-- THIS WEEK OVERVIEW -->
        <section class="week-section" id="weekSection">
          <div class="section-head">
            <h2 class="section-title">THIS WEEK</h2>
          </div>
          <div class="week-grid" id="weekGrid">
            <!-- Populated by JS -->
          </div>
        </section>
      </main>

      <!-- NOTE MODAL -->
      <div class="modal-overlay hidden" id="noteModal">
        <div class="modal-card">
          <div class="modal-header">
            <span class="modal-title" id="noteModalTitle">📝 Add Note</span>
            <button class="modal-close" id="noteModalClose">✕</button>
          </div>
          <textarea class="note-input" id="noteInput" placeholder="How did it go? Any reflections?" maxlength="500" rows="4"></textarea>
          <div class="modal-actions">
            <button class="btn-modal secondary" id="noteDeleteBtn">DELETE</button>
            <button class="btn-modal primary" id="noteSaveBtn">SAVE</button>
          </div>
        </div>
      </div>

      <!-- DIGEST MODAL -->
      <div class="modal-overlay hidden" id="digestModal">
        <div class="modal-card modal-card-wide">
          <div class="modal-header">
            <span class="modal-title" id="digestTitle">📋 Today's Digest</span>
            <button class="modal-close" id="digestModalClose">✕</button>
          </div>
          <div id="digestContent">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- STATS DASHBOARD MODAL -->
      <div class="modal-overlay hidden" id="statsModal">
        <div class="modal-card modal-card-wide">
          <div class="modal-header">
            <span class="modal-title">📊 STATS</span>
            <button class="modal-close" id="statsModalClose">✕</button>
          </div>
          <div class="stats-grid" id="statsGrid">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- NOTIFICATION SETTINGS MODAL -->
      <div class="modal-overlay hidden" id="notifModal">
        <div class="modal-card">
          <div class="modal-header">
            <span class="modal-title">🔔 Reminders</span>
            <button class="modal-close" id="notifModalClose">✕</button>
          </div>
          <div class="notif-form">
            <label class="notif-toggle-row">
              <span>Daily reminder</span>
              <div class="toggle-track" id="notifToggle">
                <div class="toggle-knob"></div>
              </div>
            </label>
            <label class="notif-time-row">
              <span>Reminder time</span>
              <input type="time" id="notifTime" class="notif-time-input" value="09:00" />
            </label>
            <button class="btn-modal primary" id="notifTestBtn" style="width:100%;margin-top:8px">🔔 TEST NOTIFICATION</button>
          </div>
        </div>
      </div>

      <!-- TOAST -->
      <div class="toast-container" id="toastContainer"></div>
    </div>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
